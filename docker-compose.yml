version: '3.8'

services:
  voice-assistant:
    build: .
    container_name: voice-assistant
    ports:
      - "8080:8080"
    environment:
      - VOICE_LLM_API_KEY=${VOICE_LLM_API_KEY}
      - VOICE_LLM_BASE_URL=${VOICE_LLM_BASE_URL:-https://api.deepseek.com}
      - VOICE_LLM_MODEL=${VOICE_LLM_MODEL:-deepseek-chat}
      - VOICE_ASR_DEVICE=${VOICE_ASR_DEVICE:-cpu}
      - VOICE_TTS_VOICE=${VOICE_TTS_VOICE:-zh-CN-XiaoxiaoNeural}
      - VOICE_SERVER_HOST=0.0.0.0
      - VOICE_SERVER_PORT=8080
    volumes:
      # 持久化模型缓存，避免重启重新下载（SenseVoiceSmall 约 300MB）
      - model_cache:/root/.cache/modelscope
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  model_cache:
